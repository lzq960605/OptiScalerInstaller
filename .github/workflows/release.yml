name: Build and Release Python Exe

on:
  push:
    tags:
      - 'v*' # v1.0, v2.1 등 태그가 푸시될 때 실행

jobs:
  build:
    runs-on: windows-latest # .exe 파일을 만들기 위해 윈도우 환경 사용

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14' # 사용하는 파이썬 버전으로 수정 가능

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        if (Test-Path requirements.txt) { pip install -r requirements.txt }

    - name: Build with PyInstaller
      run: |
        # main.py를 본인의 실행 파일 이름으로 변경하세요.
        # --onefile: 단일 파일 생성, --noconsole: 콘솔 창 안 뜨게 함
        pyinstaller --onefile --noconsole OptiScaler_Installer.py

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: dist/OptiScaler_Installer.exe # PyInstaller가 생성한 결과물 경로
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Build with PyInstaller
        env:
          OPTISCALER_SHEET_ID: ${{ secrets.OPTISCALER_SHEET_ID }}
          OPTISCALER_SHEET_GID: ${{ secrets.OPTISCALER_SHEET_GID }}
          OPTISCALER_DOWNLOAD_LINKS_SHEET_GID: ${{ secrets.OPTISCALER_DOWNLOAD_LINKS_SHEET_GID }}
        run: |
          pip install -r requirements.txt
          python build.py  # build.py 내부에서 os.getenv를 사용해 이 값들을 읽게 됩니다.
